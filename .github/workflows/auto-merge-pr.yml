name: Auto-merge PR (cursor/*)

# Cuando CI pasa en un PR de rama cursor/*, mergea a main y dispara deploy.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Obtener PR asociado
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const branch = run.head_branch || "";
            if (!branch.startsWith("cursor/")) {
              core.setFailed("skip: rama no es cursor/*");
              return;
            }
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:${branch}`,
            });
            const pr = prs[0];
            if (!pr) {
              core.setFailed("skip: no hay PR abierto");
              return;
            }
            if (pr.draft) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                draft: false,
              });
            }
            core.setOutput("number", String(pr.number));

      - name: Merge a main
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch
