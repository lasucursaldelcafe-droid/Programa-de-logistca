name: Auto-merge PR (cursor/*)

# Cuando CI pasa en un PR de rama cursor/*, mergea a main y dispara deploy.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Obtener PR y mergear a main
        id: pr
        uses: actions/github-script@v7
        with:
          # GH_PAT (classic, repo+workflow) hace que el merge dispare Pages/Firebase.
          # Con solo GITHUB_TOKEN GitHub NO encadena otros workflows (parece “rechazo”).
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            const runId = context.payload.workflow_run.id;
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const branch = run.head_branch || "";
            if (!branch.startsWith("cursor/")) {
              core.info("skip: rama no es cursor/*");
              core.setOutput("skip", "not_cursor_branch");
              return;
            }

            const head = `${context.repo.owner}:${branch}`;
            const { data: openPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head,
            });

            let pr = openPrs[0];
            if (!pr) {
              const { data: closedPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed",
                head,
                sort: "updated",
                direction: "desc",
                per_page: 10,
              });
              const merged = closedPrs.find((p) => p.merged_at);
              if (merged) {
                core.info(`skip: PR #${merged.number} ya estaba mergeado (${branch})`);
                core.setOutput("skip", "already_merged");
                core.setOutput("number", String(merged.number));
                return;
              }
              core.info(`skip: no hay PR para ${branch}`);
              core.setOutput("skip", "no_pr");
              return;
            }

            if (pr.draft) {
              // REST draft:false a menudo no basta; GraphQL markReadyForReview sí.
              const nodeId = pr.node_id;
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                    markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                      pullRequest { isDraft number }
                    }
                  }`,
                  { id: nodeId },
                );
              } catch (e) {
                core.warning(`GraphQL readyForReview: ${e.message}`);
                try {
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    draft: false,
                  });
                } catch (e2) {
                  core.warning(`REST undraft: ${e2.message}`);
                }
              }
              for (let i = 0; i < 15; i++) {
                await sleep(2000);
                const { data: refreshed } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                if (!refreshed.draft) {
                  pr = refreshed;
                  break;
                }
              }
              if (pr.draft) {
                core.setFailed(
                  `PR #${pr.number} sigue en borrador. En GitHub: Ready for review, o: gh pr ready ${pr.number}`,
                );
                return;
              }
            }

            core.setOutput("number", String(pr.number));
            core.setOutput("branch", branch);

            const mergeableMsg = (e) => String(e.message || e);
            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: "merge",
                });
                core.info(`PR #${pr.number} mergeado a main`);
                core.setOutput("merged", "true");
                break;
              } catch (e) {
                const msg = mergeableMsg(e);
                if (msg.includes("Pull Request is not mergeable") || msg.includes("Merged")) {
                  core.info(`PR #${pr.number} ya mergeado o no mergeable — OK`);
                  core.setOutput("skip", "not_mergeable");
                  return;
                }
                if (msg.includes("Pull Request is still a draft") && attempt < 5) {
                  core.info(`PR #${pr.number} aún borrador — reintento ${attempt}/5`);
                  await sleep(3000);
                  continue;
                }
                throw e;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Rama ${branch} eliminada`);
            } catch (e) {
              core.warning(`No se pudo borrar rama ${branch}: ${e.message}`);
            }

      - name: Checkout (para gh workflow run)
        if: steps.pr.outputs.merged == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Disparar deploys tras merge
        if: steps.pr.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "Disparando workflows de deploy en main…"
          # -R evita depender del remote git; GH_PAT permite encadenar workflows
          gh workflow run "Publicar app (GitHub Pages)" --repo "$REPO" --ref main
          PAGES=$?
          gh workflow run "Desplegar reglas Firestore" --repo "$REPO" --ref main
          RULES=$?
          gh workflow run "Producción completa (SPE)" --repo "$REPO" --ref main
          PROD=$?
          gh workflow run "Configurar Firebase (SPE)" --repo "$REPO" --ref main
          FIRE=$?
          {
            echo "## Deploys tras auto-merge"
            echo ""
            echo "| Workflow | Exit |"
            echo "|----------|------|"
            echo "| Pages | $PAGES |"
            echo "| Reglas Firestore | $RULES |"
            echo "| Producción completa | $PROD |"
            echo "| Configurar Firebase | $FIRE |"
            echo ""
            if [ "$PAGES" -ne 0 ] || [ "$RULES" -ne 0 ]; then
              echo "**Si falló el dispatch:** añade secret \`GH_PAT\` (PAT classic scopes \`repo\`+\`workflow\`)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Resumen
        if: always()
        run: |
          SKIP="${{ steps.pr.outputs.skip }}"
          NUM="${{ steps.pr.outputs.number }}"
          MERGED="${{ steps.pr.outputs.merged }}"
          if [ -n "$SKIP" ]; then
            echo "○ Auto-merge omitido: $SKIP"
          elif [ "$MERGED" = "true" ] && [ -n "$NUM" ]; then
            echo "✓ PR #$NUM mergeado a main"
          elif [ -n "$NUM" ]; then
            echo "✓ PR #$NUM procesado"
          else
            echo "○ Sin acción requerida"
          fi
