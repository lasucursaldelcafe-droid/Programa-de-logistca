name: Auto-merge PR (cursor/*)

# Cuando CI pasa en un PR de rama cursor/*, mergea a main y dispara deploy.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Obtener PR asociado
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const branch = run.head_branch || "";
            if (!branch.startsWith("cursor/")) {
              core.info("skip: rama no es cursor/*");
              core.setOutput("skip", "not_cursor_branch");
              return;
            }

            const head = `${context.repo.owner}:${branch}`;
            const { data: openPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head,
            });

            let pr = openPrs[0];
            if (!pr) {
              const { data: closedPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed",
                head,
                sort: "updated",
                direction: "desc",
                per_page: 10,
              });
              const merged = closedPrs.find((p) => p.merged_at);
              if (merged) {
                core.info(`skip: PR #${merged.number} ya estaba mergeado (${branch})`);
                core.setOutput("skip", "already_merged");
                core.setOutput("number", String(merged.number));
                return;
              }
              core.info(`skip: no hay PR para ${branch}`);
              core.setOutput("skip", "no_pr");
              return;
            }

            if (pr.draft) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                draft: false,
              });
            }
            core.setOutput("number", String(pr.number));
            core.setOutput("branch", branch);

      - name: Merge a main
        if: steps.pr.outputs.number != '' && steps.pr.outputs.skip != 'already_merged'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr.outputs.number }}");
            const branch = "${{ steps.pr.outputs.branch }}";
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: "merge",
              });
              core.info(`PR #${prNumber} mergeado a main`);
            } catch (e) {
              if (String(e.message || e).includes("Pull Request is not mergeable")) {
                core.info(`PR #${prNumber} ya mergeado o no mergeable — OK`);
                return;
              }
              throw e;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Rama ${branch} eliminada`);
            } catch (e) {
              core.warning(`No se pudo borrar rama ${branch}: ${e.message}`);
            }

      - name: Resumen
        if: always()
        run: |
          SKIP="${{ steps.pr.outputs.skip }}"
          NUM="${{ steps.pr.outputs.number }}"
          if [ -n "$SKIP" ]; then
            echo "○ Auto-merge omitido: $SKIP"
          elif [ -n "$NUM" ]; then
            echo "✓ PR #$NUM procesado"
          else
            echo "○ Sin acción requerida"
          fi
