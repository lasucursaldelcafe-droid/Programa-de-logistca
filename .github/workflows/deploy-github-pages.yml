name: Publicar app (GitHub Pages)

# Publica apps/web en la rama gh-pages.
# Settings → Pages → Deploy from branch → gh-pages / (root)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar y construir
        run: npm ci && npm run build:pages
        env:
          GITHUB_PAGES_BASE: /Programa-de-logistca/
          VITE_DEMO_MODE: "true"
          VITE_USE_FIREBASE_EMULATORS: "false"

      - name: Publicar en gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/web/dist
          branch: gh-pages
          clean: true
          commit-message: "deploy: sistema personal eventos (Fase 1)"

      - name: URL
        run: |
          echo "https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/"
