name: Publicar app (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sincronizar enlaces desde el repo
        run: npm ci && npm run sync:links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Construir app (base path automático)
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          VITE_DEMO_MODE: "true"
          VITE_USE_FIREBASE_EMULATORS: "false"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sincronizar docs/ y enlaces en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ README.md index.html apps/web/public/deployment.json
          git diff --staged --quiet || git commit -m "deploy: actualizar app y enlaces [skip ci]"
          git push

      - name: URL publicada
        run: |
          echo "pages_url=${{ steps.deployment.outputs.page_url }}"
          echo "repo_url=https://github.com/${{ github.repository }}"
