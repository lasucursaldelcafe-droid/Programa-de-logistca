name: Publicar app (GitHub Pages)

# Publica en gh-pages + docs/ y sincroniza enlaces automáticamente.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sincronizar enlaces desde el repo
        run: npm ci && npm run sync:links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Construir app (base path automático)
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          VITE_DEMO_MODE: "true"
          VITE_USE_FIREBASE_EMULATORS: "false"

      - name: Publicar en gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/web/dist
          branch: gh-pages
          clean: true
          commit-message: "deploy: ${{ github.event.repository.name }} @ ${{ github.sha }}"

      - name: Sincronizar docs/ y enlaces en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ README.md index.html apps/web/public/deployment.json
          git diff --staged --quiet || git commit -m "deploy: actualizar app y enlaces [skip ci]"
          git push origin main

      - name: URL publicada
        run: |
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
