name: Publicar app (GitHub Pages)

# Despliega Admin + Worker + Master vía GitHub Actions (sin Jekyll legacy).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sincronizar enlaces desde el repo
        run: npm ci && npm run sync:links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Construir las 3 plataformas
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          VITE_DEMO_MODE: "true"
          VITE_USE_FIREBASE_EMULATORS: "false"

      - name: Configurar GitHub Pages (fuente Actions)
        uses: actions/configure-pages@v5

      - name: Subir artefacto (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sincronizar docs/ y enlaces en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ docs-source/ README.md index.html apps/admin/public/deployment.json
          git diff --staged --quiet || git commit -m "deploy: actualizar app y enlaces [skip ci]"
          git push origin main

      - name: URLs publicadas
        run: |
          echo "page_url=${{ steps.deployment.outputs.page_url }}"
          echo "Admin:  ${{ steps.deployment.outputs.page_url }}"
          echo "Worker: ${{ steps.deployment.outputs.page_url }}worker/"
          echo "Master: ${{ steps.deployment.outputs.page_url }}master/"
