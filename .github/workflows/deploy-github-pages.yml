name: Publicar app (GitHub Pages)

# Publica en rama gh-pages Y en docs/ (main) para máxima compatibilidad.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar y construir
        run: npm ci && npm run build:pages
        env:
          GITHUB_PAGES_BASE: /Programa-de-logistca/
          VITE_DEMO_MODE: "true"
          VITE_USE_FIREBASE_EMULATORS: "false"

      - name: Publicar en gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/web/dist
          branch: gh-pages
          clean: true
          commit-message: "deploy: sistema personal eventos (Fase 1)"

      - name: Sincronizar docs/ en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "deploy: actualizar docs/ para GitHub Pages [skip ci]"
          git push

      - name: URL
        run: |
          echo "https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/"
