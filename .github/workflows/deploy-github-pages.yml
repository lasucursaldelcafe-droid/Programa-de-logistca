name: Publicar app (GitHub Pages)

# Publica Admin + Worker + Master en gh-pages/docs (fuente: branch gh-pages /docs).
# Evita Jekyll: cada carpeta incluye .nojekyll generado por prepare-pages.ts.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend:
        description: "Backend: auto | sheets | demo"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - sheets
          - demo
      sheets_web_app_url:
        description: "Google Sheets Web App URL (/exec)"
        required: false
        type: string
      sheets_api_token:
        description: "Token API Sheets (SPE_API_TOKEN)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      INPUT_BACKEND: ${{ github.event.inputs.backend || 'auto' }}
      INPUT_SHEETS_URL: ${{ github.event.inputs.sheets_web_app_url }}
      INPUT_SHEETS_TOKEN: ${{ github.event.inputs.sheets_api_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sincronizar enlaces desde el repo
        run: npm ci && npm run sync:links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Detectar backend (Firebase, Sheets o demo)
        id: firebase_mode
        shell: bash
        env:
          VITE_DATA_BACKEND: ${{ secrets.VITE_DATA_BACKEND }}
          VITE_SHEETS_WEB_APP_URL: ${{ secrets.VITE_SHEETS_WEB_APP_URL }}
          VITE_SHEETS_API_TOKEN: ${{ secrets.VITE_SHEETS_API_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          SHEETS_URL="${INPUT_SHEETS_URL:-$VITE_SHEETS_WEB_APP_URL}"
          SHEETS_TOKEN="${INPUT_SHEETS_TOKEN:-$VITE_SHEETS_API_TOKEN}"

          if [ "$INPUT_BACKEND" = "demo" ]; then
            echo "demo_mode=true" >> "$GITHUB_OUTPUT"
            echo "data_backend=demo" >> "$GITHUB_OUTPUT"
            echo "use_sheets=false" >> "$GITHUB_OUTPUT"
            echo "○ Modo demo forzado por workflow_dispatch"
            exit 0
          fi

          if [ "$INPUT_BACKEND" = "sheets" ] || { [ -n "$SHEETS_URL" ] && [ -n "$SHEETS_TOKEN" ]; }; then
            if [ -z "$SHEETS_URL" ] || [ -z "$SHEETS_TOKEN" ]; then
              echo "✗ backend=sheets pero faltan sheets_web_app_url o sheets_api_token"
              exit 1
            fi
            echo "demo_mode=false" >> "$GITHUB_OUTPUT"
            echo "data_backend=sheets" >> "$GITHUB_OUTPUT"
            echo "use_sheets=true" >> "$GITHUB_OUTPUT"
            echo "sheets_url=$SHEETS_URL" >> "$GITHUB_OUTPUT"
            echo "sheets_token=$SHEETS_TOKEN" >> "$GITHUB_OUTPUT"
            echo "✓ Backend Google Sheets — build producción"
            exit 0
          fi

          if [ "$VITE_DATA_BACKEND" = "sheets" ] && [ -n "$VITE_SHEETS_WEB_APP_URL" ] && [ -n "$VITE_SHEETS_API_TOKEN" ]; then
            echo "demo_mode=false" >> "$GITHUB_OUTPUT"
            echo "data_backend=sheets" >> "$GITHUB_OUTPUT"
            echo "use_sheets=true" >> "$GITHUB_OUTPUT"
            echo "sheets_url=$VITE_SHEETS_WEB_APP_URL" >> "$GITHUB_OUTPUT"
            echo "sheets_token=$VITE_SHEETS_API_TOKEN" >> "$GITHUB_OUTPUT"
            echo "✓ Backend Google Sheets (Secrets) — build producción"
            exit 0
          fi
          PLACEHOLDERS="demo-api-key demo-personal-eventos 000000000000 1:000000000000:web:demo"
          missing=()
          for key in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            val="${!key}"
            if [ -z "$val" ]; then
              missing+=("$key (vacío)")
            elif echo "$PLACEHOLDERS" | grep -qw "$val"; then
              missing+=("$key (valor de prueba)")
            fi
          done
          echo "data_backend=firebase" >> "$GITHUB_OUTPUT"
          if [ ${#missing[@]} -eq 0 ]; then
            echo "demo_mode=false" >> "$GITHUB_OUTPUT"
            echo "✓ Los 6 Secrets Firebase están completos — build con backend real"
          else
            echo "demo_mode=true" >> "$GITHUB_OUTPUT"
            echo "○ Secrets incompletos — GitHub Pages en modo demo hasta corregir:"
            printf '  - %s\n' "${missing[@]}"
            echo "  Alternativa sin JSON: Secrets VITE_DATA_BACKEND=sheets + VITE_SHEETS_*"
          fi

      - name: Construir app unificada
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          PAGES_DEPLOY_ALLOW_MISSING_FIREBASE: "true"
          VITE_DEMO_MODE: ${{ steps.firebase_mode.outputs.demo_mode }}
          VITE_USE_FIREBASE_EMULATORS: "false"
          VITE_DATA_BACKEND: ${{ steps.firebase_mode.outputs.use_sheets == 'true' && 'sheets' || secrets.VITE_DATA_BACKEND }}
          VITE_SHEETS_WEB_APP_URL: ${{ steps.firebase_mode.outputs.sheets_url || secrets.VITE_SHEETS_WEB_APP_URL }}
          VITE_SHEETS_API_TOKEN: ${{ steps.firebase_mode.outputs.sheets_token || secrets.VITE_SHEETS_API_TOKEN }}
          VITE_BLOQUEAR_INTEGRACIONES: ${{ secrets.VITE_BLOQUEAR_INTEGRACIONES || 'true' }}
          VITE_INTEGRACIONES_CLAVE: ${{ secrets.VITE_INTEGRACIONES_CLAVE || 'spe-desbloquear' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Verificar artefactos
        run: |
          test -f docs/index.html
          test -f docs/.nojekyll
          test -f docs/worker/index.html
          test -f docs/master/index.html
          echo "✓ docs/ listo (app unificada + redirecciones /worker/ y /master/)"

      - name: Publicar en gh-pages/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          target-folder: docs
          clean: true
          single-commit: true
          commit-message: "deploy: ${{ github.event.repository.name }} @ ${{ github.sha }}"

      - name: Sincronizar docs/ y enlaces en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ docs-source/ README.md index.html apps/admin/public/deployment.json
          git diff --staged --quiet || git commit -m "deploy: actualizar app y enlaces [skip ci]"
          git push origin main

      - name: URLs publicadas
        run: |
          echo "Admin:  https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Worker: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/worker/"
          echo "Master: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/master/"
