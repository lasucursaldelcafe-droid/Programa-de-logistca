name: Publicar app (GitHub Pages)

# Publica Admin + Worker + Master en gh-pages/docs (fuente: branch gh-pages /docs).
# Evita Jekyll: cada carpeta incluye .nojekyll generado por prepare-pages.ts.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend:
        description: "Backend: auto | firebase"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - firebase
  workflow_call:
    inputs:
      backend:
        description: "Backend: auto | firebase"
        required: false
        type: string
        default: auto

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      INPUT_BACKEND: ${{ inputs.backend || github.event.inputs.backend || 'auto' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Sincronizar enlaces desde el repo
        run: npm ci && npm run sync:links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Cargar config/bootstrap.json (configuración desde celular)
        run: |
          if [ -f config/bootstrap.json ]; then
            while IFS= read -r line; do
              key="${line#export }"
              name="${key%%=*}"
              val="${key#*=}"
              val="${val#\"}"
              val="${val%\"}"
              if [ -n "$val" ] && [ "$val" != "demo-api-key" ]; then
                echo "${name}=${val}" >> "$GITHUB_ENV"
                echo "○ bootstrap → ${name}"
              fi
            done < <(node scripts/read-bootstrap-config.mjs --export)
          fi

      - name: Detectar backend Firebase
        id: firebase_mode
        shell: bash
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          echo "demo_mode=false" >> "$GITHUB_OUTPUT"
          echo "data_backend=firebase" >> "$GITHUB_OUTPUT"

          PLACEHOLDERS="demo-api-key demo-personal-eventos 000000000000 1:000000000000:web:demo"
          missing=()
          for key in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID; do
            val="${!key}"
            if [ -z "$val" ]; then
              missing+=("$key (vacío)")
            elif echo "$PLACEHOLDERS" | grep -qw "$val"; then
              missing+=("$key (valor de prueba)")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "✓ Los 6 Secrets Firebase están completos — build con backend Firebase"
          else
            echo "⚠ Secrets Firebase incompletos — el build continúa pero login fallará hasta corregir:"
            printf '  - %s\n' "${missing[@]}"
          fi

      - name: Construir app unificada
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          PAGES_DEPLOY_ALLOW_MISSING_FIREBASE: "true"
          VITE_DEMO_MODE: "false"
          VITE_USE_FIREBASE_EMULATORS: "false"
          VITE_DATA_BACKEND: firebase
          VITE_BLOQUEAR_INTEGRACIONES: ${{ secrets.VITE_BLOQUEAR_INTEGRACIONES || 'true' }}
          VITE_INTEGRACIONES_CLAVE: ${{ secrets.VITE_INTEGRACIONES_CLAVE || 'spe-desbloquear' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ env.VITE_GOOGLE_MAPS_API_KEY || secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Verificar artefactos
        run: |
          test -f docs/index.html
          test -f docs/.nojekyll
          for route in descargas pendientes notificaciones worker/notificaciones worker/ayuda master/ayuda; do
            test -f "docs/$route/index.html" || { echo "✗ Falta docs/$route/index.html"; exit 1; }
          done
          test -f docs/worker/index.html
          test -f docs/master/index.html
          echo "✓ docs/ listo (app unificada + rutas SPA críticas)"

      - name: Publicar en gh-pages/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          target-folder: docs
          clean: true
          single-commit: true
          commit-message: "deploy: ${{ github.event.repository.name }} @ ${{ github.sha }}"

      - name: Sincronizar docs/ y enlaces en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ docs-source/ README.md index.html apps/admin/public/deployment.json
          git diff --staged --quiet || git commit -m "deploy: actualizar app y enlaces [skip ci]"
          git push origin main

      - name: URLs publicadas
        run: |
          echo "Admin:  https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Worker: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/worker/"
          echo "Master: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/master/"
