name: Publicar sitio estático (GitHub Pages)

# Publica automáticamente el HTML estático de docs/ en GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Inyectar config estática
        run: npm ci && npx tsx scripts/inject-static-config.ts
        env:
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_PAGES_BASE: /Programa-de-logistca

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
