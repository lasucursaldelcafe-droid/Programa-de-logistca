name: Crear usuarios Firebase (producción)

# Recrea master@eventos.test y admin@eventos.test en Firebase Auth + Firestore.
# Requiere secreto FIREBASE_SERVICE_ACCOUNT_JSON (contenido del JSON de cuenta de servicio).
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Recrear usuarios de inicio de sesión
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "✗ Falta el secreto FIREBASE_SERVICE_ACCOUNT_JSON"
            echo "  Firebase → Configuración → Cuentas de servicio → Generar clave privada"
            echo "  GitHub → Configuración → Secretos → Nuevo secreto:"
            echo "    Nombre: FIREBASE_SERVICE_ACCOUNT_JSON"
            echo "    Valor: pega TODO el contenido del archivo .json"
            exit 1
          fi
          npm run seed:production
