name: Crear usuarios Firebase (producción)

# Crea o actualiza lasucursaldelcafe@gmail.com en Firebase Auth + Firestore.
# Requiere secretos FIREBASE_SERVICE_ACCOUNT_JSON y SPE_PROD_PASSWORD.
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Crear cuenta de administración
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SPE_PROD_PASSWORD: ${{ secrets.SPE_PROD_PASSWORD }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "✗ Falta el secreto FIREBASE_SERVICE_ACCOUNT_JSON"
            echo "  Firebase → Configuración → Cuentas de servicio → Generar clave privada"
            echo "  GitHub → Settings → Secrets → FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          if [ -z "$SPE_PROD_PASSWORD" ]; then
            echo "✗ Falta el secreto SPE_PROD_PASSWORD (contraseña de lasucursaldelcafe@gmail.com)"
            exit 1
          fi
          npm run seed:production
