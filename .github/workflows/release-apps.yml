name: Publicar instaladores (Windows + Linux + Android)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apps
  cancel-in-progress: false

env:
  APP_VERSION: "0.2.3"
  VITE_USE_FIREBASE_EMULATORS: "false"
  NATIVE_BUILD: "true"
  NATIVE_BUILD_ALLOW_MISSING_FIREBASE: "true"
  CAPACITOR_SERVER_URL: "https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/"
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

jobs:
  detect-mode:
    name: Detectar modo de build
    runs-on: ubuntu-latest
    outputs:
      demo_mode: ${{ steps.mode.outputs.demo_mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: ¿Firebase completo o demo?
        id: mode
        shell: bash
        run: |
          set +e
          npx tsx scripts/ensure-production-env.ts
          code=$?
          if [ "$code" -eq 0 ]; then
            echo "demo_mode=false" >> "$GITHUB_OUTPUT"
            echo "✓ Firebase OK — build producción"
          else
            echo "demo_mode=true" >> "$GITHUB_OUTPUT"
            echo "○ Sin Firebase — build demo embebido (instaladores funcionan offline)"
          fi

  build-windows:
    name: Windows — SPE Eventos
    needs: detect-mode
    runs-on: windows-latest
    env:
      VITE_DEMO_MODE: ${{ needs.detect-mode.outputs.demo_mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar entorno
        run: npx tsx scripts/ensure-production-env.ts --native

      - name: Asegurar Electron en desktop
        run: npm install electron@35.7.5 electron-builder@25.1.8 app-builder-bin@5.0.0-alpha.10 -w @spe/desktop

      - name: Verificar app-builder-bin (Windows)
        shell: pwsh
        run: |
          $exe = "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            npm install app-builder-bin@5.0.0-alpha.10 --no-save --force
          }
          if (-not (Test-Path $exe)) { throw "app-builder.exe no encontrado en $exe" }
          Get-Item $exe

      - name: Compilar instalador Windows
        run: npm run electron:build

      - name: Listar artefactos
        shell: bash
        run: ls -la apps/desktop/release/

      - name: Subir artefactos Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: apps/desktop/release/*.exe
          retention-days: 90

  build-linux:
    name: Linux — SPE Eventos
    needs: detect-mode
    runs-on: ubuntu-latest
    env:
      VITE_DEMO_MODE: ${{ needs.detect-mode.outputs.demo_mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar entorno
        run: npx tsx scripts/ensure-production-env.ts --native

      - name: Asegurar Electron en desktop
        run: npm install electron@35.7.5 electron-builder@25.1.8 -w @spe/desktop

      - name: Compilar AppImage Linux
        run: npm run electron:build:linux

      - name: Listar artefactos
        run: ls -la apps/desktop/release/

      - name: Subir AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: 90

  build-android:
    name: Android — SPE Eventos
    needs: detect-mode
    runs-on: ubuntu-latest
    env:
      VITE_DEMO_MODE: ${{ needs.detect-mode.outputs.demo_mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Escribir local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > apps/worker/android/local.properties

      - name: Instalar dependencias
        run: npm ci

      - name: Validar entorno
        run: npx tsx scripts/ensure-production-env.ts --native

      - name: Sincronizar Capacitor (app unificada)
        run: npm run cap:sync

      - name: Compilar APK
        working-directory: apps/worker/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Renombrar APK
        run: |
          cp apps/worker/android/app/build/outputs/apk/release/app-release.apk \
            SPE-Eventos-${APP_VERSION}-android.apk
          ls -la SPE-Eventos-*.apk

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: SPE-Eventos-*.apk
          retention-days: 90

  release:
    name: GitHub Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: dist/release/windows

      - name: Descargar Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: dist/release/linux

      - name: Descargar Android
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/release/android

      - name: Preparar archivos
        run: |
          mkdir -p dist/release/all
          cp dist/release/windows/* dist/release/all/ 2>/dev/null || true
          cp dist/release/linux/* dist/release/all/ 2>/dev/null || true
          cp dist/release/android/* dist/release/all/ 2>/dev/null || true
          ls -laR dist/release/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: SPE v${{ env.APP_VERSION }} — build ${{ github.run_number }}
          make_latest: true
          generate_release_notes: true
          body: |
            ## Descargas

            | Plataforma | Archivo |
            |------------|---------|
            | **Web** | https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/descargas |
            | **Windows** (instalador) | `SPE-Admin-*-nsis.exe` |
            | **Windows** (portable) | `SPE-Admin-*-portable.exe` |
            | **Linux** | `SPE-Eventos-*-linux.AppImage` |
            | **Android** | `SPE-Eventos-*-android.apk` |
            | **iOS** | Safari → Añadir a pantalla de inicio (PWA) |

            **Una sola app:** Admin, Master y Trabajador según tu rol al iniciar sesión.

            ### Acceso rápido admin (demo)
            https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/login?spe_backend=demo&email=admin@eventos.test&password=Admin123%21&auto=1

            ### Cuentas demo
            | Rol | Correo | Contraseña |
            |-----|--------|------------|
            | Master | master@eventos.test | Master123! |
            | Admin | admin@eventos.test | Admin123! |

            ---
            Build: `${{ github.sha }}`
          files: dist/release/all/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
