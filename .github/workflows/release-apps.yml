name: Publicar instaladores (Windows + Android)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apps
  cancel-in-progress: false

env:
  APP_VERSION: "0.2.2"
  VITE_DEMO_MODE: "true"
  VITE_USE_FIREBASE_EMULATORS: "false"
  NATIVE_BUILD: "true"
  CAPACITOR_SERVER_URL: "https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/"

jobs:
  build-windows:
    name: Windows — SPE Eventos
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Asegurar Electron en desktop
        run: npm install electron@35.7.5 electron-builder@25.1.8 app-builder-bin@5.0.0-alpha.10 -w @spe/desktop

      - name: Verificar app-builder-bin (Windows)
        shell: pwsh
        run: |
          $exe = "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            npm install app-builder-bin@5.0.0-alpha.10 --no-save --force
          }
          if (-not (Test-Path $exe)) { throw "app-builder.exe no encontrado en $exe" }
          Get-Item $exe

      - name: Compilar instalador Windows
        run: npm run electron:build

      - name: Listar artefactos
        shell: bash
        run: ls -la apps/desktop/release/

      - name: Subir artefactos Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: apps/desktop/release/*.exe
          retention-days: 90

  build-android:
    name: Android — SPE Eventos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Escribir local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > apps/worker/android/local.properties

      - name: Instalar dependencias
        run: npm ci

      - name: Sincronizar Capacitor (app unificada)
        run: npm run cap:sync

      - name: Compilar APK
        working-directory: apps/worker/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Renombrar APK
        run: |
          cp apps/worker/android/app/build/outputs/apk/release/app-release.apk \
            SPE-Eventos-${APP_VERSION}-android.apk
          ls -la SPE-Eventos-*.apk

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: SPE-Eventos-*.apk
          retention-days: 90

  release:
    name: GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: dist/release/windows

      - name: Descargar Android
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/release/android

      - name: Preparar archivos
        run: |
          mkdir -p dist/release/all
          cp dist/release/windows/* dist/release/all/ 2>/dev/null || true
          cp dist/release/android/* dist/release/all/ 2>/dev/null || true
          ls -laR dist/release/

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: SPE v${{ env.APP_VERSION }} — build ${{ github.run_number }}
          make_latest: true
          generate_release_notes: true
          body: |
            ## Descargas

            | Plataforma | App | Archivo |
            |------------|-----|---------|
            | **Windows** | SPE Eventos (unificada) | `SPE-Admin-*-nsis.exe` (instalador) |
            | **Windows** | SPE Eventos (unificada) | `SPE-Admin-*-portable.exe` (sin instalar) |
            | **Android** | SPE Eventos (unificada) | `SPE-Eventos-*-android.apk` |
            | **Web** | Navegador | https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/ |

            **Una sola app:** descarga Windows o Android, inicia sesión y se abre tu panel (Admin, Master o Trabajador) según tu rol.

            ### Cuentas demo
            | Rol | Correo | Contraseña |
            |-----|--------|------------|
            | Master (plataforma) | master@eventos.test | Master123! |
            | **Administrador único** | admin@eventos.test | Admin123! |

            Supervisores y trabajadores: Admin → Personal (rol) → Cuentas (invitación con datos personales).

            ### Instalar Android
            1. Descarga el `.apk`
            2. Permite **orígenes desconocidos** en Ajustes → Seguridad
            3. Abre el archivo e instala
            4. La app requiere **internet** (carga la versión web actualizada)
            5. Inicia sesión o regístrate con invitación → se abre tu panel según tu rol

            ### Instalar Windows
            1. Descarga `SPE-Admin-*-nsis.exe`
            2. Ejecuta el instalador

            ---
            Build: `${{ github.sha }}`
          files: dist/release/all/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
