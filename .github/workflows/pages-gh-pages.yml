name: Publicar sitio estático (gh-pages)

# Publica docs/ en la rama gh-pages.
# Activar una vez: Settings → Pages → Deploy from branch → gh-pages / (root)
# URL: https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "index.html"
      - ".github/workflows/pages-gh-pages.yml"
      - "scripts/inject-static-config.ts"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Inyectar base href y config estática
        run: npm ci && npx tsx scripts/inject-static-config.ts
        env:
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GITHUB_PAGES_BASE: /Programa-de-logistca/

      - name: Publicar en gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
          commit-message: "deploy: sitio estático de logística"

      - name: Resumen de URL
        run: |
          echo "Sitio publicado en rama gh-pages."
          echo "Si ves 404, activa: Settings → Pages → gh-pages → / (root)"
          echo "URL: https://lasucursaldelcafe-droid.github.io/Programa-de-logistca/"
